<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ヤニブ (Yaniv) v5.0 Multiplayer Lobby</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
    * { box-sizing: border-box; }
    html, body { height: 100dvh; width: 100vw; margin: 0; padding: 0; overflow: hidden; background-color: #1b5e20; color: white; font-family: 'Segoe UI', sans-serif; touch-action: none; }

    /* 縦画面ブロック用 */
    #portrait-warning { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background-color: #1b5e20; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    .rotate-icon { font-size: 70px; margin-bottom: 20px; animation: rotatePhone 2s infinite ease-in-out; }
    @keyframes rotatePhone { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(-90deg); } }
    .warning-text { font-size: 20px; font-weight: bold; line-height: 1.5; margin-bottom: 10px; }

    /* 各種メニュー画面 */
    .menu-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; padding: 20px; position: relative; }
    .menu-screen h1 { font-size: 42px; color: #ffeb3b; text-shadow: 2px 2px 0px #000; margin: 0 0 15px 0; letter-spacing: 2px; }
    .menu-panel { background-color: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; border: 2px solid #388e3c; width: 100%; max-width: 350px; text-align: left; }
    .menu-panel h3 { margin-top: 0; color: #ffeb3b; text-align: center; margin-bottom: 15px; }
    .setting-item { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
    .setting-item label { font-weight: bold; font-size: 13px; color: #a5d6a7; }
    
    .btn-large { padding: 15px 20px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background-color: #ffeb3b; color: #1b5e20; box-shadow: 0 4px 0 #c51162; transition: all 0.1s; width: 80%; max-width: 280px; white-space: nowrap; margin-bottom: 10px; }
    .btn-large:active { transform: translateY(4px); box-shadow: none; }
    .btn-secondary { background-color: #e0e0e0; color: #333; padding: 10px; font-size: 14px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; width: 100%; text-align: center; }
    .btn-success { background-color: #4caf50; color: white; padding: 12px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; width: 100%; text-align: center; margin-top: 10px; }

    .version-text { position: absolute; bottom: 15px; right: 20px; font-size: 12px; color: rgba(255,255,255,0.5); font-weight: bold; }

    /* 入力フォーム類 */
    input[type="text"], input[type="number"], select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; width: 100%; font-size: 14px; }
    
    /* ロビーUI */
    .room-id-box { background:#fff; color:#000; padding:12px; text-align:center; border-radius:8px; margin-bottom:15px; font-weight:bold; font-size:16px; user-select:all; border: 3px dashed #ffeb3b; }
    .player-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
    .player-slot { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 8px; font-size: 14px; font-weight: bold; }
    .player-slot.empty { opacity: 0.5; border: 1px dashed #ccc; background: transparent; justify-content: center; }
    .icon-small { width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; overflow: hidden; background: rgba(255,255,255,0.2); }
    .icon-small img { width: 100%; height: 100%; object-fit: cover; }

    .icon-preview-box { width: 42px; height: 42px; background-color: rgba(255,255,255,0.15); border: 2px solid #ffeb3b; border-radius: 50%; display: flex; justify-content: center; align-items: center; overflow: hidden; flex-shrink: 0; }
    .icon-preview-box img { width: 100%; height: 100%; object-fit: cover; }

    /* ゲーム画面（非表示のまま今回は置いておく） */
    #game-container { display: none; }
</style>
</head>
<body>

<div id="portrait-warning">
    <div class="rotate-icon">📱</div>
    <div class="warning-text">スマホを横向きにしてください</div>
</div>

<div id="main-menu" class="menu-screen">
    <h1>YANIV</h1>
    <button class="btn-large" onclick="switchScreen('room-create-screen')">部屋を作る (ホスト)</button>
    <button class="btn-large" style="background-color: #2196f3; color: white; box-shadow: 0 4px 0 #0d47a1;" onclick="switchScreen('room-join-screen')">部屋に参加 (ゲスト)</button>
    <button class="btn-large" style="background-color: #4caf50; color: white; box-shadow: 0 4px 0 #2e7d32;" onclick="startGameOffline()">ひとりで遊ぶ (CPU戦)</button>
    <button class="btn-large" style="background-color: #e0e0e0; color: #333; box-shadow: 0 4px 0 #9e9e9e;" onclick="switchScreen('settings-menu')">設定</button>
    <div class="version-text">v5.0 Lobby Sync</div>
</div>

<div id="settings-menu" class="menu-screen" style="display: none;">
    <div class="menu-panel">
        <h3>ゲーム設定</h3>
        <div class="setting-item">
            <label>あなたの名前</label>
            <input type="text" id="my-name-input" value="あなた" maxlength="8">
        </div>
        <div class="setting-item">
            <label>あなたのアイコン</label>
            <div style="display: flex; align-items: center; gap: 12px;">
                <select id="icon-select" onchange="updatePlayerIcon(this.value)">
                    <option value="icon_default.png">デフォルト</option>
                    <option value="icon_kaeru.png">かえる</option>
                    <option value="icon_kyuuri.png">きゅうり</option>
                    <option value="icon_yuuto.png">ゆうと</option>
                </select>
                <div id="icon-preview" class="icon-preview-box">
                    <img src="icon_default.png" alt="icon">
                </div>
            </div>
        </div>
        <button class="btn-secondary" onclick="saveSettingsAndReturn()" style="margin-top: 10px;">メニューに戻る</button>
    </div>
</div>

<div id="room-create-screen" class="menu-screen" style="display: none;">
    <div class="menu-panel">
        <h3>部屋を作成 (ホスト)</h3>
        <div class="setting-item">
            <label>ルールテンプレート</label>
            <select id="rule-template" onchange="toggleCustomSettings(this.value)">
                <option value="KD">KDルール (負け1杯/アサフ2杯)</option>
                <option value="BENI">BENIルール (2回負けで1杯)</option>
                <option value="CUSTOM">カスタムルール</option>
            </select>
        </div>
        <div id="custom-settings" style="display: none; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-bottom: 10px;">
            <div class="setting-item"><label>負けの杯数</label><input type="number" id="custom-lose-drink" value="1" min="0" max="10"></div>
            <div class="setting-item"><label>ヤニブ返しの杯数</label><input type="number" id="custom-asaf-drink" value="2" min="0" max="10"></div>
        </div>
        <div class="setting-item">
            <label>試合数 (ラウンド数)</label>
            <input type="number" id="room-rounds" value="5" min="1" max="20">
        </div>
        <button class="btn-success" onclick="createRoom()">部屋を作る</button>
        <button class="btn-secondary" onclick="switchScreen('main-menu')" style="margin-top: 10px;">戻る</button>
    </div>
</div>

<div id="room-join-screen" class="menu-screen" style="display: none;">
    <div class="menu-panel">
        <h3>部屋に参加 (ゲスト)</h3>
        <div class="setting-item">
            <label>部屋ID (ホストから教えてもらう)</label>
            <input type="text" id="join-room-id" placeholder="例: yaniv-abc12" style="font-size:18px; font-weight:bold; text-align:center;">
        </div>
        <button class="btn-success" style="background-color: #2196f3;" onclick="joinRoom()">参加する</button>
        <button class="btn-secondary" onclick="switchScreen('main-menu')" style="margin-top: 10px;">戻る</button>
    </div>
</div>

<div id="room-waiting-screen" class="menu-screen" style="display: none;">
    <div class="menu-panel">
        <h3 id="lobby-title">待機ロビー</h3>
        
        <div class="room-id-box" id="room-id-display">接続準備中...</div>
        
        <div class="player-list" id="lobby-players">
            </div>

        <div id="host-controls" style="display: none;">
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button class="btn-secondary" style="background-color: #2196f3; color: white;" onclick="addCPU()">+ CPU追加</button>
                <button class="btn-secondary" style="background-color: #f44336; color: white;" onclick="removeCPU()">- CPU削除</button>
            </div>
            <button class="btn-success" onclick="startNetworkGame()" style="font-size: 18px;">ゲーム開始！</button>
        </div>

        <div id="guest-controls" style="display: none; text-align: center; color: #ffeb3b; font-weight: bold; margin-bottom: 10px;">
            ホストがゲームを開始するのを待っています...
        </div>

        <button class="btn-secondary" onclick="leaveRoom()" style="margin-top: 10px;">退出して戻る</button>
    </div>
</div>

<div id="game-container">
    <h2 style="text-align:center; margin-top:50px;">【マッチングテスト成功！】<br>※ゲーム画面への同期は次のステップで行います※</h2>
</div>

<script>
    // -----------------------------------------
    // プレイヤー＆システム基本データ
    // -----------------------------------------
    let myName = "あなた";
    let myIconStr = '<img src="icon_default.png" alt="icon">';
    
    let players = [
        { id: 0, name: myName, icon: myIconStr, isReal: true, isActive: true },
        { id: 1, name: 'CPU 1', icon: '<img src="icon_default.png" alt="icon">', isReal: false, isActive: false }, 
        { id: 2, name: 'CPU 2', icon: '<img src="icon_default.png" alt="icon">', isReal: false, isActive: false }, 
        { id: 3, name: 'CPU 3', icon: '<img src="icon_default.png" alt="icon">', isReal: false, isActive: false }  
    ];

    let ruleType = "KD"; 
    
    // --- 通信(PeerJS)用変数 ---
    let peer = null;
    let isHost = true;
    let hostConnection = null; // ゲスト用：ホストとの接続
    let guestConnections = []; // ホスト用：ゲスト達の接続リスト
    let myNetworkId = 0;       // ゲーム内の自分のID (ホストは常に0)

    function switchScreen(screenId) {
        document.querySelectorAll('.menu-screen').forEach(el => el.style.display = 'none');
        document.getElementById('game-container').style.display = 'none';
        document.getElementById(screenId).style.display = 'flex'; 
    }

    function updatePlayerIcon(fileName) { 
        myIconStr = `<img src="${fileName}" alt="icon">`;
        document.getElementById('icon-preview').innerHTML = myIconStr; 
    }

    function saveSettingsAndReturn() {
        myName = document.getElementById('my-name-input').value || "ゲスト";
        players[0].name = myName;
        players[0].icon = myIconStr;
        switchScreen('main-menu');
    }

    function toggleCustomSettings(val) {
        ruleType = val;
        document.getElementById('custom-settings').style.display = (val === 'CUSTOM') ? 'block' : 'none';
    }

    // -----------------------------------------
    // 【ホスト側】部屋を作成してIDを発行する
    // -----------------------------------------
    function createRoom() {
        isHost = true;
        myNetworkId = 0;
        players[0].name = myName;
        players[0].icon = myIconStr;
        players[0].isReal = true;
        players[0].isActive = true;
        
        // とりあえず初期状態はCPUを3人入れておく
        players[1] = { id: 1, name: 'CPU 1', icon: '<img src="icon_default.png">', isReal: false, isActive: true };
        players[2] = { id: 2, name: 'CPU 2', icon: '<img src="icon_default.png">', isReal: false, isActive: true };
        players[3] = { id: 3, name: 'CPU 3', icon: '<img src="icon_default.png">', isReal: false, isActive: true };

        document.getElementById('host-controls').style.display = 'block';
        document.getElementById('guest-controls').style.display = 'none';
        document.getElementById('lobby-title').textContent = "待機ロビー (ホスト)";
        switchScreen('room-waiting-screen');
        
        // Randomな部屋IDを生成してPeerJSに登録
        const randomId = 'yaniv-' + Math.random().toString(36).substr(2, 6);
        document.getElementById('room-id-display').innerHTML = `部屋を生成中...`;

        peer = new Peer(randomId);

        peer.on('open', (id) => {
            // 生成完了！友達に教えるIDを表示
            document.getElementById('room-id-display').innerHTML = `部屋ID: <span style="color:#e91e63;">${id}</span><br><span style="font-size:10px; color:#555;">友達にこのIDを教えてください</span>`;
            updateLobbyUI();
        });

        // ゲストから接続要求が来た時の処理
        peer.on('connection', (conn) => {
            guestConnections.push(conn);

            conn.on('data', (data) => {
                if (data.type === 'JOIN_REQUEST') {
                    handleGuestJoin(data.name, data.icon, conn);
                }
            });

            conn.on('close', () => {
                // ゲストが切断した時の処理
                guestConnections = guestConnections.filter(c => c !== conn);
                removeGuestFromLobby(conn.peer);
            });
        });
    }

    // ホスト：ゲストの参加を処理し、空き枠に入れる
    function handleGuestJoin(guestName, guestIcon, conn) {
        // CPUの枠、または非アクティブな枠を探して人間プレイヤーで上書き
        let slotIndex = players.findIndex(p => p.id !== 0 && !p.isReal);
        
        if (slotIndex !== -1) {
            players[slotIndex] = { id: slotIndex, name: guestName, icon: guestIcon, isReal: true, isActive: true, peerId: conn.peer };
            
            // ゲストに「あなたはプレイヤー〇番だよ」と教える
            conn.send({ type: 'JOIN_ACCEPTED', yourId: slotIndex });
            
            updateLobbyUI();
            broadcastLobbyState(); // 全員に最新のロビー状態を送信
        } else {
            conn.send({ type: 'JOIN_REJECTED', reason: '部屋が満員です' });
        }
    }

    // ホスト：CPU枠の操作
    function addCPU() {
        let added = false;
        for(let i=1; i<=3; i++){
            if(!players[i].isActive) { 
                players[i] = { id: i, name: `CPU ${i}`, icon: '<img src="icon_default.png">', isReal: false, isActive: true };
                added = true; break; 
            }
        }
        if(!added) alert("これ以上追加できません (最大4人)");
        updateLobbyUI();
        broadcastLobbyState();
    }

    function removeCPU() {
        let count = players.filter(p => p.isActive).length;
        if(count <= 2) { alert("最低2人は必要です"); return; }
        // 一番後ろのCPUを消す
        for(let i=3; i>=1; i--){
            if(players[i].isActive && !players[i].isReal) { 
                players[i].isActive = false; 
                break; 
            }
        }
        updateLobbyUI();
        broadcastLobbyState();
    }

    // ホスト：全員のロビー画面を同期させる
    function broadcastLobbyState() {
        if(!isHost) return;
        const cleanPlayers = players.map(p => ({ id: p.id, name: p.name, icon: p.icon, isReal: p.isReal, isActive: p.isActive }));
        guestConnections.forEach(conn => {
            conn.send({ type: 'LOBBY_UPDATE', players: cleanPlayers });
        });
    }

    // -----------------------------------------
    // 【ゲスト側】ホストの部屋IDを指定して入る
    // -----------------------------------------
    function joinRoom() {
        isHost = false;
        const hostId = document.getElementById('join-room-id').value.trim();
        if(!hostId) { alert("部屋IDを入力してください"); return; }

        document.getElementById('host-controls').style.display = 'none';
        document.getElementById('guest-controls').style.display = 'block';
        document.getElementById('lobby-title').textContent = "待機ロビー (ゲスト)";
        switchScreen('room-waiting-screen');
        
        document.getElementById('room-id-display').innerHTML = `部屋 <span style="color:#e91e63;">${hostId}</span> に接続中...`;

        peer = new Peer(); // ゲストはID指定なしでOK

        peer.on('open', () => {
            // ホストへ接続
            hostConnection = peer.connect(hostId);

            hostConnection.on('open', () => {
                // 接続成功！自分のプロフィールを送る
                document.getElementById('room-id-display').innerHTML = `ホストに接続完了！`;
                hostConnection.send({ type: 'JOIN_REQUEST', name: myName, icon: myIconStr });
            });

            hostConnection.on('data', (data) => {
                if (data.type === 'JOIN_ACCEPTED') {
                    myNetworkId = data.yourId; // ホストから割り当てられたIDを保存
                } 
                else if (data.type === 'JOIN_REJECTED') {
                    alert("入室失敗: " + data.reason);
                    leaveRoom();
                }
                else if (data.type === 'LOBBY_UPDATE') {
                    // ホストから最新のメンバー一覧をもらって画面更新
                    players = data.players;
                    updateLobbyUI();
                }
                else if (data.type === 'GAME_START') {
                    // ホストが開始ボタンを押した！
                    switchScreen('game-container');
                }
            });

            hostConnection.on('close', () => {
                alert("ホストとの接続が切れました。");
                leaveRoom();
            });
        });
        
        peer.on('error', (err) => {
            alert("接続エラー: 部屋IDが間違っている可能性があります。");
            leaveRoom();
        });
    }

    // -----------------------------------------
    // ロビーUIの描画処理 (ホスト・ゲスト共通)
    // -----------------------------------------
    function updateLobbyUI() {
        const list = document.getElementById('lobby-players');
        list.innerHTML = '';
        
        players.forEach(p => {
            if(p.isActive) {
                let badge = p.isReal ? `<span style="color:#4caf50;">👤プレイヤー</span>` : `<span style="color:#9e9e9e;">🤖 CPU</span>`;
                if(p.id === myNetworkId) badge = `<span style="color:#ffeb3b;">⭐ あなた</span>`;
                
                list.innerHTML += `
                    <div class="player-slot">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <div class="icon-small">${p.icon}</div>
                            ${p.name}
                        </div>
                        ${badge}
                    </div>
                `;
            } else {
                list.innerHTML += `<div class="player-slot empty">空き枠</div>`;
            }
        });
    }

    // 退出処理
    function leaveRoom() {
        if(peer) peer.destroy();
        peer = null; hostConnection = null; guestConnections = [];
        switchScreen('main-menu');
    }

    // オフライン1人用開始
    function startGameOffline() {
        isHost = true;
        // すぐに通信テスト画面(仮のゲーム画面)へ
        document.getElementById('game-container').innerHTML = `<h2 style="text-align:center; margin-top:50px;">【オフラインCPU戦】<br>※ゲーム処理は次のステップ！※</h2>`;
        switchScreen('game-container');
    }

    // オンラインゲーム開始 (ホストのみ実行可能)
    function startNetworkGame() {
        // ゲスト全員に「ゲーム画面に移行しろ！」と命令を送る
        guestConnections.forEach(conn => conn.send({ type: 'GAME_START' }));
        switchScreen('game-container');
    }

</script>
</body>
</html>
